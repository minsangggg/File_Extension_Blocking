<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>File Extension Blocking</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>파일 확장자 차단</h1>
      <p class="subtitle">파일 확장자에 따라 특정 형식의 파일을 첨부하거나 전송하지 못하도록 제한합니다.</p>
    </header>

    <section class="card">
      <h2>고정 확장자</h2>
      <div id="fixed-list" class="fixed-list"></div>
    </section>

    <section class="card">
      <h2>커스텀 확장자</h2>
      <div class="input-row">
        <input id="custom-input" type="text" maxlength="20" placeholder="확장자 입력" />
        <button id="custom-add" type="button">추가</button>
        <span id="custom-count" class="count">0/200</span>
      </div>
      <div id="custom-tags" class="tag-list"></div>
      <p id="message" class="message" aria-live="polite"></p>
    </section>

    <section class="card">
      <h2>파일 업로드 테스트</h2>
      <div class="upload-row">
        <label class="file-label" for="file-input">
          <input id="file-input" type="file" />
          <span id="file-name">파일을 선택하세요</span>
        </label>
        <button id="file-upload" type="button">업로드</button>
      </div>
      <div id="upload-message" class="message" aria-live="polite">
        <span id="upload-text"></span>
        <button id="upload-close" type="button" aria-label="닫기">닫기</button>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
